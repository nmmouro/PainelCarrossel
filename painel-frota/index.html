<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Painel Frota</title>

<link rel="stylesheet" href="./css/styles.css">

</head>

<body>

<!-- AUDIO -->
<audio id="beep" preload="auto">
  <source src="./alerta.mp3" type="audio/mpeg">
</audio>

<!-- ================= HEADER ================= -->

<!-- ================= HEADER ================= -->
  <header class="topbar">

    <div>
      <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
    </div>

    <div class="center">
      <h1 class="title">MOVIMENTAÇÃO DIÁRIA</h1>
    </div>

    <div class="right">
      <div id="clock"></div>

      <div class="actions">
        <button id="toggle-audio">🔊 SOM</button>
        <button id="toggle-fullscreen">⛶ TELA</button>
      </div>
    </div>

  </header>

<!-- ================= APP ================= -->

<main id="app" aria-live="polite"></main>

<!-- ================= SCRIPTS ================= -->

<script type="module">

import "./js/app.js";

/* CLOCK */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleDateString("pt-BR") + " — " +
    now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

setInterval(updateClock,1000);
updateClock();

/* AUDIO */
const audio = document.getElementById("beep");
const audioBtn = document.getElementById("toggle-audio");

let sound = true;

function updateAudio(){
  audioBtn.innerText = sound ? "🔊 SOM ON" : "🔇 SOM OFF";
  audioBtn.classList.toggle("off", !sound);
}

audioBtn.onclick = ()=>{
  sound = !sound;
  updateAudio();
};

window.playBeep = () => {
  if(!sound) return;
  audio.currentTime = 0;
  audio.play().catch(()=>{});
};

/* FULLSCREEN */
document.getElementById("toggle-fullscreen").onclick = async ()=>{
  if(!document.fullscreenElement){
    await document.documentElement.requestFullscreen();
  }else{
    await document.exitFullscreen();
  }
};

</script>



  <script src="js/styles.js" defer></script>
  <script src="js/config.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/render.js" defer></script>
  <script src="js/app.js" defer></script>

</body>
</html>
